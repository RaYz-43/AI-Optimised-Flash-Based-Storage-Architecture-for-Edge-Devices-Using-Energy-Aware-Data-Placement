  <circle cx="162" cy="96" r="170" fill="#F9C289" fill-opacity="0.22"/>
  <circle cx="1085" cy="82" r="190" fill="#9CB8ED" fill-opacity="0.20"/>

  <rect x="18" y="18" width="1164" height="684" rx="28" fill="#F7F2E9" stroke="#E1D7C8"/>
  <rect x="18" y="18" width="185" height="684" rx="28" fill="#F2EBDD"/>
